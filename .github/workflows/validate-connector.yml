name: Validate Custom Connector

on:
  pull_request:
    branches:
      - main
    paths:
      - 'CustomConnector/**'
      - '.github/workflows/validate-connector.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: windows-latest
    defaults:
      run:
        shell: pwsh
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Validate JSON is well-formed
        # windows-latest ships Python 3.12 + pip on PATH, so no setup-python step.
        run: |
          python -c "import json; [json.load(open(f)) for f in ('CustomConnector/PdfFormFiller.swagger.json','CustomConnector/apiProperties.json','CustomConnector/apiProperties.schema.json')]; print('JSON OK')"

      - name: Install validators (paconn + check-jsonschema)
        run: pip install paconn check-jsonschema

      - name: Validate connector definition (paconn)
        # `paconn validate` runs the same rule checks as the portal Swagger
        # Validator. It needs no environment or login, so it is safe on PRs.
        run: paconn validate --api-def CustomConnector/PdfFormFiller.swagger.json

      - name: Validate apiProperties against schema
        run: check-jsonschema --schemafile CustomConnector/apiProperties.schema.json CustomConnector/apiProperties.json
